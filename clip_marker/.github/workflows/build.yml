name: Build & Release

on:
  push:
    branches: [main, master]
    tags:     ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: >
          pyinstaller --onefile --noconsole --name "ClipMarker" --icon=icon.ico
          --collect-all easyocr
          --collect-all torchvision
          --hidden-import=easyocr
          --hidden-import=pygame
          --hidden-import=cv2
          app.py

      - name: Upload artifact (every push)
        uses: actions/upload-artifact@v4
        with:
          name: ClipMarker-Windows
          path: dist/ClipMarker.exe

      - name: Create GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "ClipMarker ${{ github.ref_name }}"
          body: |
            ## ClipMarker ${{ github.ref_name }}

            ### 使い方
            1. `ClipMarker.exe` をダウンロードして起動
            2. 動画ファイルを開いて「Start Analysis」を押すだけ
            3. **初回起動時のみ** OCR用モデルを自動ダウンロード（約100MB・1回のみ）

            ### 動作環境
            - Windows 10 / 11 (64bit)
            - 追加インストール不要

            ### オプション
            - 音声再生には ffmpeg が必要です → https://ffmpeg.org

            ### 主な機能
            - 「をたおした！」バナーをOCRで自動検出してキルマーカーを付与
            - 動画プレイヤー内蔵（等倍再生・音声対応）
            - マーカー付きシークバー・キーボードショートカット
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: dist/ClipMarker.exe
